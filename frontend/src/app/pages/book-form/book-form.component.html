<div class="book-form-container">
  <div class="form-card">
    <h1>Add New Book</h1>

    <form [formGroup]="bookForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="title">Title *</label>
        <input 
          type="text" 
          id="title" 
          formControlName="title"
          class="form-control"
          [class.is-invalid]="submitted && f['title'].errors">
        <div class="error-message" *ngIf="submitted && f['title'].errors">
          Title is required
        </div>
      </div>

      <div class="form-group">
        <label for="author">Author *</label>
        <input 
          type="text" 
          id="author" 
          formControlName="author"
          class="form-control"
          [class.is-invalid]="submitted && f['author'].errors">
        <div class="error-message" *ngIf="submitted && f['author'].errors">
          Author is required
        </div>
      </div>

      <div class="form-group">
        <label for="genre">Genre</label>
        <input 
          type="text" 
          id="genre" 
          formControlName="genre"
          class="form-control">
      </div>

      <div class="form-group">
        <label for="status">Status</label>
        <select 
          id="status" 
          formControlName="status"
          class="form-control">
          <option *ngFor="let option of statusOptions" [value]="option.value">
            {{ option.label }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label for="rating">Rating (1-5)</label>
        <input 
          type="number" 
          id="rating" 
          formControlName="rating"
          class="form-control"
          min="1"
          max="5"
          [class.is-invalid]="submitted && f['rating'].errors">
        <div class="error-message" *ngIf="submitted && f['rating'].errors">
          Rating must be between 1 and 5
        </div>
      </div>

      <div class="form-group">
        <label for="total_pages">Total Pages</label>
        <input 
          type="number" 
          id="total_pages" 
          formControlName="total_pages"
          class="form-control">
      </div>

      <div class="form-group">
        <label for="notes">Notes</label>
        <textarea 
          id="notes" 
          formControlName="notes"
          class="form-control"
          rows="4"></textarea>
      </div>

      <div class="form-group">
        <label>Cover Color</label>
        <div class="color-swatches">
          <div 
            *ngFor="let color of colorSwatches"
            class="color-swatch"
            [style.background-color]="color"
            [class.selected]="f['cover_color'].value === color"
            (click)="selectColor(color)">
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-cancel" (click)="onCancel()">
          Cancel
        </button>
        <button type="submit" class="btn btn-submit">
          Add Book
        </button>
      </div>
    </form>
  </div>
</div>
